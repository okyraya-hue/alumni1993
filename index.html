<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni SMP PGRI II Depok 1993</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* WRAPPER UTAMA (INI KUNCI BIAR RATA) */
.wrapper{
  max-width:1000px;
  margin:auto;
  padding:0 15px; /* samakan kiri kanan */
}

/* HEADER */
header{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  margin-bottom:10px;
}

/* ISI HEADER */
.header-inner{
  padding:30px 0; /* TIDAK ADA padding kiri kanan lagi */
  text-align:center;
}

.logo{
  width:140px;
  margin-bottom:10px;
}

header h1{
  font-size:22px;
  margin-bottom:5px;
}

header p{
  font-size:13px;
  opacity:0.8;
}

/* CONTAINER */
.container{
  padding:10px 0;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:14px;
  margin-bottom:18px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

/* MEMBER */
.member{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.member:hover{
  transform:translateY(-4px);
}

.member img{
  width:70px;
  height:70px;
  border-radius:50%;
  margin-bottom:10px;
}

/* INPUT */
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

/* INPUT */
input{
  background:#f1f5f9;
  color:#000;
}

/* BUTTON */
button{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}
</style>
</head>

<body>

<div class="wrapper">

<header>
  <div class="header-inner">
    <img src="logo.png" class="logo">
    <h1>Alumni SMP PGRI II Depok</h1>
    <p>Jalan Letnan Hatta Sukirman Depok II</p>
    <p>Angkatan 1993</p>
  </div>
</header>

<div class="container">

<div class="card">
<h2>Tambah Alumni</h2>
<input id="nama" placeholder="Nama">
<input id="kota" placeholder="Kota">
<input type="file" id="foto">
<button onclick="tambahAlumni()">Simpan</button>
</div>

<div class="card">
<h2>Daftar Alumni</h2>
<div class="grid" id="listAlumni"></div>
</div>

<div class="card">
<h2>Data Guru</h2>
<input id="namaGuru" placeholder="Nama Guru">
<button onclick="tambahGuru()">Simpan</button>
<div class="grid" id="listGuru"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "alumni1993-pgri.firebaseapp.com",
  databaseURL: "https://alumni1993-pgri-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tambahAlumni(){
  const nama = document.getElementById('nama').value;
  const kota = document.getElementById('kota').value;
  const file = document.getElementById('foto').files[0];

  if(!nama) return alert('Isi nama');

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      db.ref('alumni').push({nama,kota,foto:e.target.result});
    }
    reader.readAsDataURL(file);
  } else {
    db.ref('alumni').push({nama,kota,foto:''});
  }

  document.getElementById('nama').value='';
  document.getElementById('kota').value='';
  document.getElementById('foto').value='';
}

function tampilkan(){
  db.ref('alumni').on('value', (snapshot)=>{
    const data = snapshot.val();
    const list = document.getElementById('listAlumni');
    list.innerHTML='';

    if(data){
      for(let id in data){
        list.innerHTML += `
        <div class="member">
          <img src="${data[id].foto || 'https://via.placeholder.com/80'}">
          <h4>${data[id].nama}</h4>
          <p>${data[id].kota}</p>
        </div>`;
      }
    }
  });
}

function tambahGuru(){
  const namaGuru = document.getElementById('namaGuru').value;
  if(!namaGuru) return alert('Isi nama guru');

  db.ref('guru').push({nama:namaGuru});
  document.getElementById('namaGuru').value='';
}

function tampilkanGuru(){
  db.ref('guru').on('value', (snapshot)=>{
    const data = snapshot.val();
    const list = document.getElementById('listGuru');
    list.innerHTML='';

    if(data){
      for(let id in data){
        list.innerHTML += `
        <div class="member">
          <h4>${data[id].nama}</h4>
        </div>`;
      }
    }
  });
}

tampilkan();
tampilkanGuru();
</script>

</body>
</html>
