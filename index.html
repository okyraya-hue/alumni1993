<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni SMP PGRI II Depok 1993</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0f172a;color:white}
header {text-align:center;padding:40px;background:#2563eb}
.container {max-width:1000px;margin:auto;padding:20px}
.card {background:rgba(255,255,255,0.08);padding:20px;border-radius:15px;margin-bottom:20px}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.member {background:rgba(255,255,255,0.1);padding:15px;border-radius:12px;text-align:center}
.member img {width:80px;height:80px;border-radius:50%;object-fit:cover}
input,button {width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}
button {background:#38bdf8;color:white;cursor:pointer}
</style>
</head>

<body>
<header>
<h1>Alumni SMP PGRI II Depok</h1>
<p>Angkatan 1993</p>
</header>

<div class="container">

<div class="card">
<h2>Tambah Alumni</h2>
<input id="nama" placeholder="Nama">
<input id="kota" placeholder="Kota">
<button onclick="tambahAlumni()">Simpan</button>
</div>

<div class="card">
<h2>Daftar Alumni</h2>
<div class="grid" id="listAlumni"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCdtPgc8EnFsLxUOOyVIWE0ItY6VihCY3A",
  authDomain: "alumni1993-pgri.firebaseapp.com",
  databaseURL: "https://alumni1993-pgri-default-rtdb.firebaseio.com",
  projectId: "alumni1993-pgri",
  storageBucket: "alumni1993-pgri.firebasestorage.app",
  messagingSenderId: "828759284051",
  appId: "1:828759284051:web:bbd9cc7465e5bc61dc29a6",
  measurementId: "G-70PWZ22YJ9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tambahAlumni(){
  const nama = document.getElementById('nama').value;
  const kota = document.getElementById('kota').value;

  if(!nama) return alert('Isi nama');

  db.ref('alumni').push({nama,kota});

  document.getElementById('nama').value='';
  document.getElementById('kota').value='';
}

function tampilkan(){
  db.ref('alumni').on('value', (snapshot)=>{
    const data = snapshot.val();
    const list = document.getElementById('listAlumni');
    list.innerHTML='';

    if(data){
      for(let id in data){
        list.innerHTML += `
        <div class="member">
          <img src="https://via.placeholder.com/80">
          <h4>${data[id].nama}</h4>
          <p>${data[id].kota}</p>
        </div>`;
      }
    }
  });
}

tampilkan();
</script>

</body>
</html>
