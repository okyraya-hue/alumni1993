<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni SMP PGRI II Depok 1993</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* WRAPPER */
.wrapper{
  max-width:1000px;
  margin:auto;
  padding:0 15px;
}

/* HEADER */
header{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.2);
}

/* ISI HEADER */
.header-inner{
  padding:25px 0 20px; /* 👈 lebih rapat */
  text-align:center;
}

.logo{
  width:140px;
  margin-bottom:8px;
}

header h1{
  font-size:22px;
  margin-bottom:4px;
}

header p{
  font-size:13px;
  opacity:0.8;
}

/* CONTAINER */
.container{
  padding:10px 0 0; /* 👈 rapat ke header */
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:14px;
  margin-bottom:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

/* MEMBER */
.member{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.member img{
  width:70px;
  height:70px;
  border-radius:50%;
  margin-bottom:10px;
}

/* INPUT */
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input{
  background:#f1f5f9;
  color:#000;
}

button{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<header>
  <div class="header-inner">
    <img src="logo.png" class="logo">
    <h1>Alumni SMP PGRI II Depok</h1>
    <p>Jalan Letnan Hatta Sukirman Depok II</p>
    <p>Angkatan 1993</p>
  </div>
</header>

<div class="container">

<div class="card">
<h2>Tambah Alumni</h2>
<input id="nama" placeholder="Nama">
<input id="kota" placeholder="Kota">
<input type="file" id="foto">
<button onclick="tambahAlumni()">Simpan</button>
</div>

<div class="card">
<h2>Daftar Alumni</h2>
<div class="grid" id="listAlumni"></div>
</div>

<div class="card">
<h2>Data Guru</h2>
<input id="namaGuru" placeholder="Nama Guru">
<button onclick="tambahGuru()">Simpan</button>
<div class="grid" id="listGuru"></div>
</div>

</div>

</div>

</body>
</html>
